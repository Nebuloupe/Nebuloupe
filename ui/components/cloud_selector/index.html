<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --card: rgba(10, 15, 30, 0.92);
      --border: #1e293b;
      --text: #cbd5e1;
      --muted: #94a3b8;
      --accent: #14b8a6;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: transparent; overflow: visible; }
    body { font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }

    .grid {
      display: flex;
      gap: 14px;
      justify-content: center;
      align-items: stretch;
      width: 100%;
      padding-top: 10px;
      padding-bottom: 8px;
      overflow: visible;
    }

    .card {
      flex: 1;
      max-width: 200px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 28px 16px 24px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      overflow: hidden;
      color: var(--text);
      user-select: none;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--c, #1e293b), transparent);
      opacity: 0.55;
    }

    .card:hover {
      transform: translateY(-5px) scale(1.015);
      border-color: var(--c, #334155);
      box-shadow: 0 16px 42px rgba(0,0,0,0.55), 0 0 0 1px var(--c, #334155);
    }

    .card.sel {
      border-color: var(--c, var(--accent));
      background: rgba(20,184,166,0.05);
      box-shadow: 0 0 0 1px var(--c, var(--accent)), 0 10px 34px rgba(0,0,0,0.5);
    }

    .card.disabled {
      opacity: 0.45;
      pointer-events: none;
    }

    .check {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--c, var(--accent));
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #030712;
      font-weight: 900;
      box-shadow: 0 0 10px var(--c, rgba(20,184,166,0.6));
    }
    .card.sel .check { display: flex; }

    .icon-wrap {
      width: 96px;
      height: 96px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 2px;
    }

    .icon {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }

    .name {
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text);
    }

    .status {
      margin-top: 10px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 18px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 8px rgba(20,184,166,0.7);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    const sendMessage = (type, data = {}) => {
      window.parent.postMessage(
        { isStreamlitMessage: true, type, ...data },
        "*"
      );
    };

    const root = document.getElementById("root");
    let state = { clouds: [], selected: "", disabled: false };
    let lastHeight = 0;

    function setHeight() {
      const raw = Math.ceil(root.getBoundingClientRect().height);
      // Add headroom for hover lift/shadow so cards don't clip near iframe edges.
      const bounded = Math.max(240, Math.min(raw + 20, 360));
      if (Math.abs(bounded - lastHeight) >= 2) {
        lastHeight = bounded;
        sendMessage("streamlit:setFrameHeight", { height: bounded });
      }
    }

    function render() {
      const cardsHtml = state.clouds.map((c) => {
        const sel = c.id === state.selected ? "sel" : "";
        const dis = state.disabled ? "disabled" : "";
        return `
          <div class="card ${sel} ${dis}" style="--c:${c.glow}" data-cloud="${c.id}">
            <div class="check">✓</div>
            <div class="icon-wrap">
              <img class="icon" src="${c.img}" width="${c.w}" height="${c.h}" alt="${c.short}"/>
            </div>
            <div class="name">${c.short}</div>
          </div>`;
      }).join("");

      const selCloud = state.clouds.find(c => c.id === state.selected);
      const status = state.disabled
        ? '<div class="status" style="color:#14b8a6;"><span class="status-dot" style="background:#14b8a6;box-shadow:0 0 8px rgba(20,184,166,0.75);"></span>Scanning - provider locked</div>'
        : (selCloud
            ? `<div class="status"><span class="status-dot" style="background:${selCloud.glow};box-shadow:0 0 8px ${selCloud.glow};"></span>${selCloud.full} selected</div>`
            : '<div class="status"><span class="status-dot" style="background:#64748b;box-shadow:none;"></span>Click a cloud card to select a provider</div>');

      root.innerHTML = `<div class="grid">${cardsHtml}</div>${status}`;

      root.querySelectorAll(".card").forEach((card) => {
        card.addEventListener("click", () => {
          if (state.disabled) return;
          const id = card.getAttribute("data-cloud");
          if (id === state.selected) return;
          sendMessage("streamlit:setComponentValue", { value: id });
          // Let Streamlit push the next render state to avoid double animation/bounce.
        });
      });

      setHeight();
    }

    function onRender(event) {
      if (!event.data || event.data.type !== "streamlit:render") return;
      const args = event.data.args || {};
      state.clouds = Array.isArray(args.clouds) ? args.clouds : [];
      state.selected = args.selected || "";
      state.disabled = !!args.disabled;
      render();
    }

    window.addEventListener("message", onRender);
    sendMessage("streamlit:componentReady", { apiVersion: 1 });
    setHeight();
  </script>
</body>
</html>
